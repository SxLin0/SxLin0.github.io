title: "宵宵"
name: "宵宵"
description: "宵宵的个人主页、文章、诗歌、散文和博客笔记。"
url: "https://sxlin0.github.io"
baseurl: ""
repository: "SxLin0/SxLin0.github.io"
locale: "zh-CN"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "air"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap

author:
  name: "宵宵"
  avatar: "/src/photo.jpg"
  bio: "Software engineering student, literary lover, music enthusiast."

defaults:
  - scope:
      path: ""
    values:
      layout: "ocean"

exclude:
  - Gemfile
  - Gemfile.lock
  - .bundle
  - README.md
  - node_modules
  - vendor/bundle
