<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="src/photo.jpg" type="image/png">
    <title>Writing Reader - Xiaoxiao's Homepage</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2d3436;
            --accent-color: #70a1ff;
            --gradient: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 34px 18px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--secondary-color);
            background: var(--gradient);
            line-height: 1.8;
        }

        .reader-shell {
            max-width: 1080px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .reader-header {
            padding: 28px 34px;
            border-bottom: 1px solid rgba(112, 161, 255, 0.22);
            background: #fff;
        }

        .reader-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--primary-color);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 0 13px;
            border: 1px solid rgba(112, 161, 255, 0.34);
            border-radius: 8px;
            background: #f8f9fa;
        }

        .reader-title {
            margin: 0;
            color: var(--primary-color);
            font-size: clamp(1.7rem, 4vw, 2.45rem);
            line-height: 1.25;
        }

        .reader-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            color: #747d8c;
            font-size: 0.95rem;
        }

        .chip {
            padding: 2px 10px;
            border-radius: 999px;
            color: #3867d6;
            background: rgba(112, 161, 255, 0.14);
        }

        .reader-content {
            padding: 24px;
            background: #f1f4f8;
        }

        .document-frame {
            display: block;
            width: 100%;
            min-height: 78vh;
            border: 0;
            border-radius: 10px;
            background: #fff;
            box-shadow: inset 0 0 0 1px rgba(45, 52, 54, 0.08);
        }

        .reader-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .action-link {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 8px;
            color: #fff;
            background: var(--primary-color);
        }

        .action-link.secondary {
            color: var(--accent-color);
            background: #f8f9fa;
            border: 1px solid rgba(112, 161, 255, 0.34);
        }

        .action-link:hover {
            color: #fff;
            text-decoration: none;
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(255, 71, 87, 0.24);
        }

        .error {
            padding: 18px;
            border-radius: 8px;
            background: #fff4f4;
            color: #c0392b;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            body {
                padding: 18px 12px;
            }

            .reader-header {
                padding: 22px;
            }

            .reader-content {
                padding: 12px;
            }

            .document-frame {
                min-height: 72vh;
            }
        }
    </style>
</head>

<body>
    <main class="reader-shell">
        <header class="reader-header">
            <nav class="reader-nav" aria-label="Reader navigation">
                <a class="nav-link" href="index.html">Back Home</a>
                <a class="nav-link" id="source-link" href="#">Original File</a>
            </nav>
            <h1 class="reader-title" id="reader-title">Loading...</h1>
            <div class="reader-meta" id="reader-meta"></div>
        </header>
        <section class="reader-content">
            <iframe class="document-frame" id="document-frame" title="Writing preview"></iframe>
        </section>
    </main>

    <script>
        const works = {
            'software-major': {
                title: '关于填报软件工程专业的一些看法',
                section: 'Articles',
                format: 'docx',
                source: 'content/readable/articles/software-major.txt',
                preview: 'content/print/software-major.html',
                pdf: 'content/pdf/software-major.pdf',
                original: 'content/articles/关于填报软件工程专业的一些看法.docx'
            },
            'capital-scientific-thinking': {
                title: '《资本论》中的科学思维',
                section: 'Articles',
                format: 'docx',
                source: 'content/readable/articles/capital-scientific-thinking.txt',
                preview: 'content/print/capital-scientific-thinking.html',
                pdf: 'content/pdf/capital-scientific-thinking.pdf',
                original: 'content/articles/《资本论》中的科学思维%20.docx'
            },
            'digital-labor-alienation': {
                title: '数字时代劳动异化的四重维度与解放路径',
                section: 'Articles',
                format: 'docx',
                source: 'content/readable/articles/digital-labor-alienation.txt',
                preview: 'content/print/digital-labor-alienation.html',
                pdf: 'content/pdf/digital-labor-alienation.pdf',
                original: 'content/articles/数字时代劳动异化的四重维度与解放路径.docx'
            },
            'summer-thoughts': {
                title: '夏日咏怀',
                section: 'Poem & Essay',
                format: 'md',
                source: 'content/poem-essay/夏日咏怀.md',
                preview: 'content/print/summer-thoughts.html',
                pdf: 'content/pdf/summer-thoughts.pdf',
                original: 'content/poem-essay/夏日咏怀.md'
            },
            'night-boat-home': {
                title: '夜行舟归家',
                section: 'Poem & Essay',
                format: 'md',
                source: 'content/poem-essay/夜行舟归家.md',
                preview: 'content/print/night-boat-home.html',
                pdf: 'content/pdf/night-boat-home.pdf',
                original: 'content/poem-essay/夜行舟归家.md'
            },
            'untitled-mid-autumn': {
                title: '无题',
                section: 'Poem & Essay',
                format: 'md',
                source: 'content/poem-essay/无题.md',
                preview: 'content/print/untitled-mid-autumn.html',
                pdf: 'content/pdf/untitled-mid-autumn.pdf',
                original: 'content/poem-essay/无题.md'
            },
            'yellow-river': {
                title: '登黄河古迹怀古',
                section: 'Poem & Essay',
                format: 'md',
                source: 'content/poem-essay/登黄河古迹怀古.md',
                preview: 'content/print/yellow-river.html',
                pdf: 'content/pdf/yellow-river.pdf',
                original: 'content/poem-essay/登黄河古迹怀古.md'
            },
            'red-beans': {
                title: '红豆',
                section: 'Poem & Essay',
                format: 'md',
                source: 'content/poem-essay/红豆.md',
                preview: 'content/print/red-beans.html',
                pdf: 'content/pdf/red-beans.pdf',
                original: 'content/poem-essay/红豆.md'
            },
            'spring-essay': {
                title: '浅谈“春”',
                section: 'Poem & Essay',
                format: 'docx',
                source: 'content/readable/poem-essay/spring-essay.txt',
                preview: 'content/print/spring-essay.html',
                pdf: 'content/pdf/spring-essay.pdf',
                original: 'content/poem-essay/浅谈“春”.docx'
            }
        };

        const params = new URLSearchParams(window.location.search);
        const work = works[params.get('work')];
        const title = document.getElementById('reader-title');
        const meta = document.getElementById('reader-meta');
        const frame = document.getElementById('document-frame');
        const sourceLink = document.getElementById('source-link');

        function setActions() {
            const actions = document.createElement('div');
            actions.className = 'reader-actions';
            actions.innerHTML = `
                <a class="action-link" href="${work.pdf}" target="_blank" rel="noopener">Open PDF</a>
                <a class="action-link secondary" href="${work.pdf}" download>Download PDF</a>
                <a class="action-link secondary" href="${work.source}" target="_blank" rel="noopener">Text Source</a>
            `;
            document.querySelector('.reader-header').appendChild(actions);
        }

        function loadWork() {
            if (!work) {
                title.textContent = 'Work Not Found';
                meta.innerHTML = '<span class="chip">404</span>';
                frame.replaceWith(Object.assign(document.createElement('div'), {
                    className: 'error',
                    textContent: 'The requested work does not exist. Please return home and choose another title.'
                }));
                sourceLink.style.display = 'none';
                return;
            }

            document.title = `${work.title} - Xiaoxiao's Homepage`;
            title.textContent = work.title;
            meta.innerHTML = `<span class="chip">${work.section}</span><span class="chip">${work.format}</span>`;
            sourceLink.href = work.original;
            sourceLink.setAttribute('target', '_blank');
            sourceLink.setAttribute('rel', 'noopener');
            frame.src = work.preview;
            setActions();
        }

        loadWork();
    </script>
</body>

</html>
