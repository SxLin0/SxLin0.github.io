<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>夜行舟归家</title>
    <style>
        @page {
            size: A4;
            margin: 18mm 17mm;
        }

        body {
            margin: 0;
            color: #222831;
            background: #fff;
            font-family: "Songti SC", "Noto Serif CJK SC", "SimSun", serif;
            font-size: 12.2pt;
            line-height: 1.82;
            text-align: center;
        }

        h1 {
            margin: 0 auto 24px;
            color: #171717;
            font-size: 26pt;
            line-height: 1.25;
            font-weight: 800;
        }

        h2 {
            margin: 22px 0 8px;
            color: #ff4757;
            font-size: 16pt;
            line-height: 1.35;
            break-after: avoid;
        }

        h3 {
            margin: 16px 0 6px;
            color: #2f5fb3;
            font-size: 13.5pt;
            line-height: 1.4;
            break-after: avoid;
        }

        p {
            margin: 0 auto 10px;
            text-align: center;
        }

        .lead {
            display: inline-block;
            max-width: 86%;
            padding: 11px 18px;
            border-left: 0;
            border-radius: 6px;
            background: #f7faff;
        }

        .bullet {
            position: relative;
            margin-left: auto;
            margin-right: auto;
        }

        .bullet::before {
            content: none;
        }
        .signature {
            width: min(220px, 48%);
            margin: 30px 0 0 auto;
        }

        .signature p {
            text-align: right;
            margin-bottom: 4px;
        }

        .poem-lines {
            margin-top: 30px;
            font-size: 16pt;
            line-height: 2.15;
            text-align: center;
        }

        .poem-lines p {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>夜行舟归家</h1>
    <div class="poem-lines"><p>南雁携书催还家，鲈鱼正美游子意。</p>
<p>万籁无声舟徐行，江心渔火一点红。</p></div>
</body>
</html>
