<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>夏日咏怀</title>
    <style>
        @page {
            size: A4;
            margin: 18mm 17mm;
        }

        body {
            margin: 0;
            color: #222831;
            background: #fff;
            font-family: "Songti SC", "Noto Serif CJK SC", "SimSun", serif;
            font-size: 12.2pt;
            line-height: 1.82;
            text-align: center;
        }

        h1 {
            margin: 0 auto 24px;
            color: #171717;
            font-size: 26pt;
            line-height: 1.25;
            font-weight: 800;
        }

        h2 {
            margin: 22px 0 8px;
            color: #ff4757;
            font-size: 16pt;
            line-height: 1.35;
            break-after: avoid;
        }

        h3 {
            margin: 16px 0 6px;
            color: #2f5fb3;
            font-size: 13.5pt;
            line-height: 1.4;
            break-after: avoid;
        }

        p {
            margin: 0 auto 10px;
            text-align: center;
        }

        .lead {
            display: inline-block;
            max-width: 86%;
            padding: 11px 18px;
            border-left: 0;
            border-radius: 6px;
            background: #f7faff;
        }

        .bullet {
            position: relative;
            margin-left: auto;
            margin-right: auto;
        }

        .bullet::before {
            content: none;
        }
        .signature {
            width: min(220px, 48%);
            margin: 30px 0 0 auto;
        }

        .signature p {
            text-align: right;
            margin-bottom: 4px;
        }

        .poem-lines {
            margin-top: 30px;
            font-size: 16pt;
            line-height: 2.15;
            text-align: center;
        }

        .poem-lines p {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>夏日咏怀</h1>
    <div class="poem-lines"><p>2020年夏天</p>
<p>蝉声扰暑意难平，身困书窗心远行。</p>
<p>应闻家中切切语，句句皆是唤儿名。</p>
<p>愿将此心化长力，不到长城志不成。</p>
<p>山河依旧朱颜改，莫待白首空叹声。</p>
<p>注：处女作，时值酷暑，又逢学校补课，难抑思家之苦，故作此。</p></div>
</body>
</html>
