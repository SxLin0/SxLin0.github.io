<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>红豆</title>
    <style>
        @page {
            size: A4;
            margin: 18mm 17mm;
        }

        body {
            margin: 0;
            color: #222831;
            background: #fff;
            font-family: "Songti SC", "Noto Serif CJK SC", "SimSun", serif;
            font-size: 12.2pt;
            line-height: 1.82;
        }

        .cover-rule {
            width: 56px;
            height: 5px;
            margin-bottom: 18px;
            border-radius: 99px;
            background: #ff4757;
        }

        .section {
            display: inline-block;
            margin-bottom: 12px;
            padding: 3px 10px;
            color: #3867d6;
            border-radius: 99px;
            background: #edf4ff;
            font: 700 9.5pt "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        h1 {
            margin: 0 0 20px;
            color: #171717;
            font-size: 26pt;
            line-height: 1.25;
            font-weight: 800;
        }

        h2 {
            margin: 22px 0 8px;
            color: #ff4757;
            font-size: 16pt;
            line-height: 1.35;
            break-after: avoid;
        }

        h3 {
            margin: 16px 0 6px;
            color: #2f5fb3;
            font-size: 13.5pt;
            line-height: 1.4;
            break-after: avoid;
        }

        p {
            margin: 0 0 9px;
            text-align: justify;
        }

        .lead {
            padding: 11px 14px;
            border-left: 4px solid #70a1ff;
            border-radius: 6px;
            background: #f7faff;
        }

        .bullet {
            position: relative;
            margin-left: 18px;
        }

        .bullet::before {
            content: "";
            position: absolute;
            left: -16px;
            top: 0.76em;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #70a1ff;
        }

        .poem-lines {
            margin-top: 30px;
            font-size: 16pt;
            line-height: 2.15;
            text-align: center;
        }

        .poem-lines p {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="cover-rule"></div>
    <div class="section">Poem &amp; Essay</div>
    <h1>红豆</h1>
    <div class="poem-lines"><p>红豆应枝生，</p>
<p>采撷解思愁。</p>
<p>佳人若相见，</p>
<p>携情千里舟。</p></div>
</body>
</html>
